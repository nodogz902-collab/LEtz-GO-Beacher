<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0891b2" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Beach Tracker" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="icon" href="icon.svg" />
  <title>Beach Volleyball Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    * { -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    const storage = {
      async get(key) {
        try { const value = localStorage.getItem('bvt_' + key); return value ? { value } : null; } catch (e) { return null; }
      },
      async set(key, value) {
        try { localStorage.setItem('bvt_' + key, value); return { value }; } catch (e) { return null; }
      },
    };

    const videoDB = {
      async open() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open('BeachVideos', 1);
          req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains('videos')) db.createObjectStore('videos', { keyPath: 'matchId' });
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      },
      async save(matchId, blob) {
        const db = await this.open();
        return new Promise((resolve, reject) => {
          const tx = db.transaction('videos', 'readwrite');
          tx.objectStore('videos').put({ matchId, blob, savedAt: Date.now() });
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      },
      async get(matchId) {
        const db = await this.open();
        return new Promise((resolve, reject) => {
          const tx = db.transaction('videos', 'readonly');
          const req = tx.objectStore('videos').get(matchId);
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      },
      async delete(matchId) {
        const db = await this.open();
        return new Promise((resolve, reject) => {
          const tx = db.transaction('videos', 'readwrite');
          tx.objectStore('videos').delete(matchId);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      },
    };

    const Icon = ({ children, size = 16 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{children}</svg>
    );
    const ArrowLeft = ({ size }) => <Icon size={size}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></Icon>;
    const Trash2 = ({ size }) => <Icon size={size}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></Icon>;
    const Undo = ({ size }) => <Icon size={size}><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></Icon>;

    const ATTACK_TYPES = [
      { id: 'hard', label: 'Hard', emoji: '💥' },
      { id: 'pokey', label: 'Pokey', emoji: '👉' },
      { id: 'cut', label: 'Cut', emoji: '✂️' },
      { id: 'line', label: 'Line', emoji: '📏' },
    ];

    const RECEPTION_QUALITY = [
      { id: 'r3', label: 'Perfekt', value: 3, color: 'from-green-500 to-emerald-600' },
      { id: 'r1', label: 'Im Feld', value: 1, color: 'from-amber-500 to-yellow-600' },
    ];

    function calcStats(events, playerRole = null) {
      const filtered = playerRole ? events.filter(e => e.player === playerRole) : events;
      const attacks = filtered.filter(e => e.type === 'attack');
      const attackKills = attacks.filter(e => e.outcome === 'point_us').length;
      const attackErrors = attacks.filter(e => e.outcome === 'point_opp').length;
      const attackTotal = attacks.length;
      const attackPct = attackTotal > 0 ? Math.round((attackKills / attackTotal) * 100) : 0;
      const serves = filtered.filter(e => e.type === 'serve');
      const aces = serves.filter(e => e.outcome === 'point_us').length;
      const serveErrors = serves.filter(e => e.outcome === 'point_opp').length;
      const receptions = filtered.filter(e => e.type === 'reception');
      const recPerfect = receptions.filter(e => e.quality === 3).length;
      const recField = receptions.filter(e => e.quality === 1).length;
      const recError = receptions.filter(e => e.quality === -1).length;
      const recTotal = receptions.length;
      const recAvg = recTotal > 0 ? (receptions.reduce((s, r) => s + Math.max(0, r.quality), 0) / recTotal).toFixed(2) : '—';
      const blocks = filtered.filter(e => e.type === 'block' && e.outcome === 'point_us').length;
      const digs = filtered.filter(e => e.type === 'dig').length;
      return { attackKills, attackErrors, attackTotal, attackPct, aces, serveErrors, recPerfect, recField, recError, recTotal, recAvg, blocks, digs };
    }

    function calcSideoutStats(events) {
      const pointEvents = events.filter(e => e.outcome === 'point_us' || e.outcome === 'point_opp');
      const oppServes = pointEvents.filter(e => e.serving === 'opp');
      const ourServes = pointEvents.filter(e => e.serving === 'us');
      const sideoutsWon = oppServes.filter(e => e.outcome === 'point_us').length;
      const sideoutOpps = oppServes.length;
      const sideoutPct = sideoutOpps > 0 ? Math.round((sideoutsWon / sideoutOpps) * 100) : 0;
      const pointsScored = ourServes.filter(e => e.outcome === 'point_us').length;
      const pointScoringOpps = ourServes.length;
      const pointScoringPct = pointScoringOpps > 0 ? Math.round((pointsScored / pointScoringOpps) * 100) : 0;
      return { sideoutsWon, sideoutOpps, sideoutPct, pointsScored, pointScoringOpps, pointScoringPct };
    }

    // === Match Video Player ===
    function MatchVideoPlayer({ matchId, events, teamSnap }) {
      const [videoUrl, setVideoUrl] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const videoEl = useRef(null);

      useEffect(() => {
        let mounted = true;
        let currentUrl = null;
        async function load() {
          try {
            const record = await videoDB.get(matchId);
            if (record && record.blob && mounted) {
              currentUrl = URL.createObjectURL(record.blob);
              setVideoUrl(currentUrl);
            } else if (mounted) {
              setError('Video nicht gefunden');
            }
          } catch (e) {
            if (mounted) setError('Fehler: ' + e.message);
          }
          if (mounted) setLoading(false);
        }
        load();
        return () => { mounted = false; if (currentUrl) URL.revokeObjectURL(currentUrl); };
      }, [matchId]);

      const jumpTo = (seconds) => {
        if (videoEl.current && seconds != null) {
          videoEl.current.currentTime = Math.max(0, seconds - 3);
          videoEl.current.play().catch(() => {});
        }
      };

      const deleteVideo = async () => {
        if (!confirm('Video löschen? Stats bleiben.')) return;
        try { await videoDB.delete(matchId); setVideoUrl(null); setError('Video gelöscht'); } catch (e) {}
      };

      if (loading) return <div className="bg-white/95 rounded-2xl p-4 shadow-xl mb-3 text-center text-xs text-gray-500">🎬 Lade Video...</div>;
      if (error || !videoUrl) return <div className="bg-yellow-100 border-2 border-yellow-400 rounded-2xl p-3 mb-3 text-xs text-yellow-800 text-center">🎬 {error || 'Kein Video'}</div>;

      const eventsWithTime = events.filter(e => e.videoTime != null);

      return (
        <div className="bg-white/95 rounded-2xl p-3 shadow-xl mb-3">
          <div className="flex justify-between items-center mb-2">
            <h3 className="font-black text-pink-700">🎬 Match-Video</h3>
            <button onClick={deleteVideo} className="text-red-500 text-xs font-bold">🗑️</button>
          </div>
          <video ref={videoEl} src={videoUrl} controls playsInline className="w-full rounded-xl mb-2" />
          {eventsWithTime.length > 0 && (
            <>
              <div className="text-xs font-bold text-gray-600 mb-1">📍 Zu Event springen:</div>
              <div className="space-y-1 max-h-48 overflow-y-auto">
                {eventsWithTime.map(e => {
                  let label = '';
                  if (e.type === 'attack') label = `⚔️ ${e.subtype}`;
                  else if (e.type === 'serve') label = '🏐 Serve';
                  else if (e.type === 'block') label = e.subtype === 'stuff' ? '💪 Stuff' : '✋ Touch';
                  else if (e.type === 'reception') label = '📥 Annahme';
                  else if (e.type === 'dig') label = '🛡️ Dig';
                  else if (e.type === 'error') label = `❌ ${e.subtype}`;
                  const outcomeEmoji = e.outcome === 'point_us' ? '🟢' : e.outcome === 'point_opp' ? '🔴' : '⚪';
                  const playerName = e.player ? teamSnap[e.player]?.name : '—';
                  const mins = Math.floor(e.videoTime / 60);
                  const secs = e.videoTime % 60;
                  return (
                    <button key={e.id} onClick={() => jumpTo(e.videoTime)} className="w-full flex items-center gap-2 bg-gray-50 hover:bg-pink-50 rounded-lg px-2 py-1.5 text-xs active:scale-95">
                      <span className="font-mono text-[10px] text-gray-500 w-10">{mins}:{secs.toString().padStart(2, '0')}</span>
                      <span className="flex-1 text-left font-semibold">{outcomeEmoji} {label}</span>
                      <span className="text-gray-500 text-[10px]">{playerName}</span>
                    </button>
                  );
                })}
              </div>
            </>
          )}
        </div>
      );
    }

    function BeachTracker() {
      const [view, setView] = useState('home');
      const [team, setTeam] = useState({ blocker: null, defender: null });
      const [matches, setMatches] = useState([]);
      const [currentMatch, setCurrentMatch] = useState(null);
      const [loading, setLoading] = useState(true);
      const [editingRole, setEditingRole] = useState(null);
      const [nameInput, setNameInput] = useState('');
      const [showNewMatch, setShowNewMatch] = useState(false);
      const [opponentName, setOpponentName] = useState('');
      const [firstServe, setFirstServe] = useState('us');
      const [viewingMatch, setViewingMatch] = useState(null);
      const [selectedPlayer, setSelectedPlayer] = useState(null);
      const [actionMode, setActionMode] = useState(null);
      const [servingTeam, setServingTeam] = useState('us');

      // Video recording state
      const [recordingEnabled, setRecordingEnabled] = useState(false);
      const [isRecording, setIsRecording] = useState(false);
      const [recordingStart, setRecordingStart] = useState(null);
      const [cameraStream, setCameraStream] = useState(null);
      const [recordingError, setRecordingError] = useState('');
      const [cameraPreviewOpen, setCameraPreviewOpen] = useState(false);
      const mediaRecorderRef = useRef(null);
      const recordedChunksRef = useRef([]);

      useEffect(() => {
        async function load() {
          try { const t = await storage.get('team'); if (t) setTeam(JSON.parse(t.value)); } catch (e) {}
          try { const m = await storage.get('matches'); if (m) setMatches(JSON.parse(m.value)); } catch (e) {}
          setLoading(false);
        }
        load();
      }, []);

      const saveTeam = async (t) => { setTeam(t); await storage.set('team', JSON.stringify(t)); };
      const saveMatches = async (m) => { setMatches(m); await storage.set('matches', JSON.stringify(m)); };

      const setPlayerName = (role, name) => {
        const newTeam = { ...team };
        if (!name.trim()) newTeam[role] = null;
        else newTeam[role] = { name: name.trim() };
        saveTeam(newTeam);
        setEditingRole(null);
        setNameInput('');
      };

      const teamReady = team.blocker && team.defender;
      const getSetLimit = (setNum) => setNum === 3 ? 15 : 21;
      const getSwitchEvery = (setNum) => setNum === 3 ? 5 : 7;

      // Recording helpers
      const startRecording = async () => {
        try {
          setRecordingError('');
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'environment' },
            audio: false,
          });
          setCameraStream(stream);
          let mimeType = 'video/webm;codecs=vp9';
          if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm;codecs=vp8';
          if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';
          if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/mp4';
          if (!MediaRecorder.isTypeSupported(mimeType)) { setRecordingError('Video-Aufnahme nicht unterstützt'); return false; }
          recordedChunksRef.current = [];
          const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 1500000 });
          recorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunksRef.current.push(e.data); };
          recorder.start(1000);
          mediaRecorderRef.current = recorder;
          setIsRecording(true);
          setRecordingStart(Date.now());
          return true;
        } catch (err) {
          setRecordingError('Kamera-Fehler: ' + err.message);
          return false;
        }
      };

      const stopRecording = async () => {
        return new Promise((resolve) => {
          if (!mediaRecorderRef.current) { resolve(null); return; }
          const recorder = mediaRecorderRef.current;
          recorder.onstop = () => {
            const blob = new Blob(recordedChunksRef.current, { type: recorder.mimeType });
            if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
            setCameraStream(null);
            setIsRecording(false);
            mediaRecorderRef.current = null;
            resolve(blob);
          };
          recorder.stop();
        });
      };

      const startNewMatch = async () => {
        if (!opponentName.trim()) return;
        let recStarted = false;
        if (recordingEnabled) {
          recStarted = await startRecording();
          if (!recStarted) {
            if (!confirm('Aufnahme fehlgeschlagen. Match ohne Video starten?')) return;
          }
        }
        const match = {
          id: Date.now().toString(),
          opponent: opponentName.trim(),
          date: new Date().toISOString(),
          teamSnapshot: { ...team },
          events: [], set: 1, teamScore: 0, opponentScore: 0, setScores: [],
          firstServe,
          hasVideo: recStarted,
          videoStartTime: recStarted ? Date.now() : null,
        };
        setCurrentMatch(match);
        setServingTeam(firstServe);
        setShowNewMatch(false);
        setOpponentName('');
        setSelectedPlayer(null);
        setActionMode(null);
        setView('match');
      };

      const updateMatch = (fn) => setCurrentMatch(prev => fn(prev));

      const recordEvent = (details) => {
        const videoTime = isRecording && recordingStart ? Math.floor((Date.now() - recordingStart) / 1000) : null;
        const event = {
          id: Date.now().toString() + Math.random(),
          set: currentMatch.set, serving: servingTeam,
          teamScore: currentMatch.teamScore, opponentScore: currentMatch.opponentScore,
          timestamp: Date.now(), videoTime,
          ...details,
        };
        let teamDelta = 0, oppDelta = 0, newServing = servingTeam;
        if (details.outcome === 'point_us') { teamDelta = 1; newServing = 'us'; }
        else if (details.outcome === 'point_opp') { oppDelta = 1; newServing = 'opp'; }
        updateMatch(m => ({ ...m, events: [...m.events, event], teamScore: m.teamScore + teamDelta, opponentScore: m.opponentScore + oppDelta }));
        setServingTeam(newServing);
        setActionMode(null);
        setSelectedPlayer(null);
      };

      const undoLastEvent = () => {
        if (!currentMatch || currentMatch.events.length === 0) return;
        const last = currentMatch.events[currentMatch.events.length - 1];
        let teamDelta = 0, oppDelta = 0;
        if (last.outcome === 'point_us') teamDelta = -1;
        if (last.outcome === 'point_opp') oppDelta = -1;
        updateMatch(m => ({ ...m, events: m.events.slice(0, -1), teamScore: m.teamScore + teamDelta, opponentScore: m.opponentScore + oppDelta }));
        setServingTeam(last.serving);
      };

      const nextSet = () => {
        updateMatch(m => ({
          ...m, set: m.set + 1,
          setScores: [...m.setScores, { teamScore: m.teamScore, opponentScore: m.opponentScore }],
          teamScore: 0, opponentScore: 0,
        }));
        setServingTeam('us');
        setActionMode(null);
        setSelectedPlayer(null);
      };

      const finishMatch = async () => {
        let videoBlob = null;
        if (isRecording) videoBlob = await stopRecording();
        const finalMatch = {
          ...currentMatch,
          setScores: [...currentMatch.setScores, { teamScore: currentMatch.teamScore, opponentScore: currentMatch.opponentScore }],
          finished: true,
        };
        if (videoBlob) { try { await videoDB.save(finalMatch.id, videoBlob); } catch (e) {} }
        await saveMatches([finalMatch, ...matches]);
        setCurrentMatch(null);
        setSelectedPlayer(null);
        setActionMode(null);
        setView('home');
      };

      const cancelMatch = async () => {
        if (confirm('Spiel verwerfen?')) {
          if (isRecording) await stopRecording();
          setCurrentMatch(null);
          setSelectedPlayer(null);
          setActionMode(null);
          setView('home');
        }
      };

      if (loading) return (
        <div className="min-h-screen bg-gradient-to-br from-cyan-500 via-sky-400 to-amber-300 flex items-center justify-center">
          <div className="text-white text-xl font-bold animate-pulse">Lade... 🏖️</div>
        </div>
      );

      // === HOME ===
      if (view === 'home') return (
        <div className="min-h-screen bg-gradient-to-br from-cyan-500 via-sky-400 to-amber-300 p-4">
          <div className="max-w-md mx-auto">
            <div className="text-center py-6">
              <div className="text-6xl mb-2">🏖️🏐</div>
              <h1 className="text-4xl font-black text-white drop-shadow-lg">Beach Tracker</h1>
              <p className="text-white/90 font-semibold text-sm">2v2 · Sideout Stats · Shot Tracking</p>
            </div>
            {currentMatch && (
              <button onClick={() => setView('match')} className="w-full bg-gradient-to-r from-green-400 to-emerald-500 text-white p-5 rounded-3xl shadow-xl mb-4 font-bold active:scale-95 animate-pulse">
                ▶️ Laufendes Spiel fortsetzen<br/><span className="text-sm opacity-90">vs {currentMatch.opponent} · Satz {currentMatch.set}</span>
              </button>
            )}
            <div className="grid grid-cols-2 gap-3 mb-4">
              <button onClick={() => setShowNewMatch(true)} disabled={!teamReady} className="bg-white/95 p-5 rounded-3xl shadow-xl active:scale-95 disabled:opacity-50">
                <div className="text-4xl mb-1">🚀</div><div className="font-black text-cyan-700">Neues Match</div>
              </button>
              <button onClick={() => setView('team')} className="bg-white/95 p-5 rounded-3xl shadow-xl active:scale-95">
                <div className="text-4xl mb-1">👥</div><div className="font-black text-orange-600">Team</div>
                <div className="text-xs text-gray-500">{teamReady ? '✓ Bereit' : 'Setup'}</div>
              </button>
              <button onClick={() => setView('stats')} className="bg-white/95 p-5 rounded-3xl shadow-xl active:scale-95 col-span-2">
                <div className="text-4xl mb-1">📊</div><div className="font-black text-sky-700">Statistiken & Historie</div>
                <div className="text-xs text-gray-500">{matches.length} Matches</div>
              </button>
            </div>
            {!teamReady && (
              <div className="bg-yellow-100 border-2 border-yellow-400 p-3 rounded-2xl text-yellow-900 text-center font-semibold text-xs">
                👋 Lege erst dein 2er-Team fest (Blocker + Defender)
              </div>
            )}
          </div>

          {showNewMatch && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                <h2 className="text-2xl font-black text-cyan-700 mb-4">🚀 Neues Match</h2>
                <input type="text" placeholder="Gegner-Team..." value={opponentName} onChange={e => setOpponentName(e.target.value)} className="w-full p-4 border-2 border-cyan-200 rounded-2xl mb-4 font-semibold focus:outline-none focus:border-cyan-500" autoFocus />
                <div className="mb-4">
                  <div className="text-sm font-bold text-gray-700 mb-2">Wer beginnt mit Aufschlag?</div>
                  <div className="grid grid-cols-2 gap-2">
                    <button onClick={() => setFirstServe('us')} className={`p-3 rounded-2xl font-bold ${firstServe === 'us' ? 'bg-gradient-to-r from-cyan-600 to-sky-500 text-white' : 'bg-gray-100'}`}>🏐 Wir</button>
                    <button onClick={() => setFirstServe('opp')} className={`p-3 rounded-2xl font-bold ${firstServe === 'opp' ? 'bg-gradient-to-r from-orange-500 to-red-500 text-white' : 'bg-gray-100'}`}>🏐 Gegner</button>
                  </div>
                </div>
                <div className="mb-4">
                  <label className="flex items-start gap-2 p-3 rounded-2xl bg-gradient-to-r from-pink-50 to-purple-50 border-2 border-pink-200 cursor-pointer">
                    <input type="checkbox" checked={recordingEnabled} onChange={e => setRecordingEnabled(e.target.checked)} className="mt-0.5 w-5 h-5" />
                    <div className="flex-1">
                      <div className="font-bold text-sm text-pink-700">🎬 Video-Aufnahme aktivieren</div>
                      <div className="text-[10px] text-gray-600 mt-0.5">720p-Aufnahme mit Event-Zeitmarken. ⚠️ Akku-intensiv, ~2GB/Stunde.</div>
                    </div>
                  </label>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => { setShowNewMatch(false); setOpponentName(''); }} className="flex-1 bg-gray-200 p-3 rounded-2xl font-bold">Abbrechen</button>
                  <button onClick={startNewMatch} disabled={!opponentName.trim()} className="flex-1 bg-gradient-to-r from-cyan-600 to-sky-500 text-white p-3 rounded-2xl font-bold disabled:opacity-50">Los! 🏖️</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );

      // === TEAM ===
      if (view === 'team') return (
        <div className="min-h-screen bg-gradient-to-br from-orange-400 via-amber-400 to-yellow-300 p-4">
          <div className="max-w-md mx-auto">
            <div className="flex items-center gap-3 mb-4 pt-2">
              <button onClick={() => setView('home')} className="bg-white/20 p-2 rounded-full"><ArrowLeft /></button>
              <h1 className="text-2xl font-black text-white">👥 Team</h1>
            </div>
            <div className="bg-white/10 backdrop-blur rounded-2xl p-3 mb-3 text-white text-xs">
              Beach 2v2: ein Spieler blockt vorne, einer verteidigt hinten. Feste Rollen.
            </div>
            {['blocker', 'defender'].map(role => {
              const player = team[role];
              const isBlocker = role === 'blocker';
              return (
                <div key={role} className={`bg-gradient-to-br ${isBlocker ? 'from-indigo-500 to-purple-600' : 'from-cyan-500 to-teal-600'} rounded-3xl p-4 mb-3 shadow-xl text-white`}>
                  <div className="flex items-center gap-3">
                    <div className="text-5xl">{isBlocker ? '🧱' : '🛡️'}</div>
                    <div className="flex-1">
                      <div className="text-xs opacity-80 font-bold uppercase">{isBlocker ? 'Blocker' : 'Defender'}</div>
                      <div className="font-black text-xl">{player ? player.name : <span className="opacity-60 italic">Nicht zugewiesen</span>}</div>
                    </div>
                  </div>
                  <div className="mt-3">
                    {editingRole === role ? (
                      <div className="flex gap-2">
                        <input autoFocus value={nameInput} onChange={e => setNameInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && setPlayerName(role, nameInput)} className="flex-1 p-2 rounded-xl text-gray-800 font-bold" placeholder="Name" />
                        <button onClick={() => setPlayerName(role, nameInput)} className="bg-white text-green-600 px-4 rounded-xl font-black">✓</button>
                      </div>
                    ) : (
                      <div className="flex gap-2">
                        <button onClick={() => { setEditingRole(role); setNameInput(player?.name || ''); }} className="flex-1 bg-white/20 backdrop-blur text-white p-2 rounded-xl font-bold">
                          {player ? '✏️ Ändern' : '+ Name eintragen'}
                        </button>
                        {player && <button onClick={() => setPlayerName(role, '')} className="bg-red-500/80 text-white px-3 rounded-xl"><Trash2 size={16} /></button>}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );

      // === MATCH ===
      if (view === 'match' && currentMatch) {
        const teamSnap = currentMatch.teamSnapshot;
        const setLimit = getSetLimit(currentMatch.set);
        const currentScore = currentMatch.teamScore + currentMatch.opponentScore;
        const switchEvery = getSwitchEvery(currentMatch.set);
        const nextSwitch = (Math.floor(currentScore / switchEvery) + 1) * switchEvery;
        const pointsToSwitch = nextSwitch - currentScore;
        const teamClose = currentMatch.teamScore >= setLimit - 2;
        const oppClose = currentMatch.opponentScore >= setLimit - 2;
        const stats = calcStats(currentMatch.events);
        const sideoutStats = calcSideoutStats(currentMatch.events);

        return (
          <div className="min-h-screen bg-gradient-to-br from-cyan-500 via-sky-500 to-amber-400 p-3 pb-6">
            <div className="max-w-md mx-auto">
              {/* Score */}
              <div className="bg-white/95 rounded-2xl p-3 shadow-xl mb-3">
                <div className="flex justify-between items-center mb-1">
                  <button onClick={cancelMatch} className="text-red-500 text-xs font-bold">✕ Ende</button>
                  <div className="text-xs font-bold text-gray-500 flex items-center gap-2">
                    SATZ {currentMatch.set} · bis {setLimit}
                    {isRecording && (
                      <button onClick={() => setCameraPreviewOpen(true)} className="flex items-center gap-1 bg-red-500 text-white px-1.5 py-0.5 rounded-full text-[9px] font-black animate-pulse">
                        <span className="w-1.5 h-1.5 bg-white rounded-full"></span> REC
                      </button>
                    )}
                  </div>
                  <button onClick={finishMatch} className="text-green-600 text-xs font-bold">✓ Fertig</button>
                </div>
                <div className="grid grid-cols-2 gap-3 mt-2">
                  <div className="bg-gradient-to-br from-cyan-50 to-sky-100 rounded-2xl p-2">
                    <button onClick={() => setServingTeam('us')} className="w-full text-center">
                      <div className={`text-xs font-bold flex items-center justify-center gap-1 ${servingTeam === 'us' ? 'text-cyan-700' : 'text-gray-400'}`}>
                        WIR <span className={servingTeam === 'us' ? '' : 'opacity-30'}>🏐</span>
                      </div>
                    </button>
                    <div className="flex items-center justify-between mt-1">
                      <button onClick={() => updateMatch(m => ({ ...m, teamScore: Math.max(0, m.teamScore - 1) }))} className="bg-red-400 text-white w-9 h-9 rounded-full font-black text-lg active:scale-90 shadow">−</button>
                      <div className={`text-5xl font-black ${teamClose ? 'text-orange-600 animate-pulse' : 'text-cyan-700'}`}>{currentMatch.teamScore}</div>
                      <button onClick={() => updateMatch(m => ({ ...m, teamScore: m.teamScore + 1 }))} className="bg-green-500 text-white w-9 h-9 rounded-full font-black text-lg active:scale-90 shadow">+</button>
                    </div>
                  </div>
                  <div className="bg-gradient-to-br from-orange-50 to-amber-100 rounded-2xl p-2">
                    <button onClick={() => setServingTeam('opp')} className="w-full text-center">
                      <div className={`text-xs font-bold flex items-center justify-center gap-1 ${servingTeam === 'opp' ? 'text-orange-700' : 'text-gray-400'}`}>
                        <span className={servingTeam === 'opp' ? '' : 'opacity-30'}>🏐</span> {currentMatch.opponent.toUpperCase().slice(0, 12)}
                      </div>
                    </button>
                    <div className="flex items-center justify-between mt-1">
                      <button onClick={() => updateMatch(m => ({ ...m, opponentScore: Math.max(0, m.opponentScore - 1) }))} className="bg-red-400 text-white w-9 h-9 rounded-full font-black text-lg active:scale-90 shadow">−</button>
                      <div className={`text-5xl font-black ${oppClose ? 'text-red-600 animate-pulse' : 'text-orange-600'}`}>{currentMatch.opponentScore}</div>
                      <button onClick={() => updateMatch(m => ({ ...m, opponentScore: m.opponentScore + 1 }))} className="bg-green-500 text-white w-9 h-9 rounded-full font-black text-lg active:scale-90 shadow">+</button>
                    </div>
                  </div>
                </div>
                {currentMatch.setScores.length > 0 && (
                  <div className="text-center text-xs text-gray-500 mt-2">{currentMatch.setScores.map(s => `${s.teamScore}-${s.opponentScore}`).join(' | ')}</div>
                )}
                {currentScore > 0 && pointsToSwitch <= switchEvery && (
                  <div className="text-center text-[10px] font-bold text-amber-700 mt-1 bg-amber-100 rounded-full py-0.5">
                    🔄 Seitenwechsel in {pointsToSwitch} {pointsToSwitch === 1 ? 'Punkt' : 'Punkten'}
                  </div>
                )}
              </div>

              {/* Live Stats */}
              <div className="bg-white/95 rounded-2xl p-2 shadow-xl mb-3">
                <div className="grid grid-cols-4 gap-1 text-center text-[10px]">
                  <div className="bg-cyan-100 p-1.5 rounded"><div className="font-black text-cyan-700">{sideoutStats.sideoutPct}%</div><div className="text-gray-600">Sideout</div></div>
                  <div className="bg-orange-100 p-1.5 rounded"><div className="font-black text-orange-700">{sideoutStats.pointScoringPct}%</div><div className="text-gray-600">Point Scoring</div></div>
                  <div className="bg-green-100 p-1.5 rounded"><div className="font-black text-green-700">{stats.attackPct}%</div><div className="text-gray-600">Attack</div></div>
                  <div className="bg-sky-100 p-1.5 rounded"><div className="font-black text-sky-700">{stats.recAvg}</div><div className="text-gray-600">Rec. Ø</div></div>
                </div>
              </div>

              {recordingError && (
                <div className="bg-red-100 border-2 border-red-400 text-red-800 p-2 rounded-xl mb-2 text-xs font-bold">⚠️ {recordingError}</div>
              )}

              {/* Two Player Columns */}
              <div className="grid grid-cols-2 gap-2 mb-3">
                {['blocker', 'defender'].map(role => {
                  const player = teamSnap[role];
                  const isBlocker = role === 'blocker';
                  const roleColor = isBlocker ? 'from-indigo-500 to-purple-600' : 'from-cyan-500 to-teal-600';
                  return (
                    <div key={role} className="bg-white/95 rounded-2xl p-2 shadow-xl">
                      <div className={`bg-gradient-to-r ${roleColor} text-white rounded-lg px-2 py-1 mb-2 flex items-center gap-1`}>
                        <span className="text-sm">{isBlocker ? '🧱' : '🛡️'}</span>
                        <span className="font-black text-xs truncate flex-1">{player.name}</span>
                      </div>

                      <div className="text-[10px] font-bold text-gray-500 mb-1">⚔️ ANGRIFF</div>
                      <div className="space-y-1 mb-2">
                        {ATTACK_TYPES.map(t => (
                          <div key={t.id} className="flex gap-1 items-center">
                            <div className="flex items-center gap-1 py-1 flex-1 min-w-0">
                              <span className="text-base flex-shrink-0">{t.emoji}</span>
                              <span className="text-[11px] font-bold text-gray-700 truncate">{t.label}</span>
                            </div>
                            <button onClick={() => recordEvent({ type: 'attack', subtype: t.id, player: role, outcome: 'point_us' })} className="bg-green-500 text-white text-xs font-black py-1.5 rounded-lg active:scale-90 shadow w-9 flex-shrink-0">✓</button>
                            <button onClick={() => recordEvent({ type: 'attack', subtype: t.id, player: role, outcome: 'point_opp' })} className="bg-red-500 text-white text-xs font-black py-1.5 rounded-lg active:scale-90 shadow w-9 flex-shrink-0">✗</button>
                            <button onClick={() => recordEvent({ type: 'attack', subtype: t.id, player: role, outcome: 'neutral' })} className="bg-gray-400 text-white text-xs font-black py-1.5 rounded-lg active:scale-90 shadow w-9 flex-shrink-0">○</button>
                          </div>
                        ))}
                      </div>

                      <div className="text-[10px] font-bold text-gray-500 mb-1">🏐 AUFSCHLAG</div>
                      <div className="grid grid-cols-3 gap-1 mb-2">
                        <button onClick={() => recordEvent({ type: 'serve', player: role, outcome: 'point_us' })} className="bg-gradient-to-br from-green-500 to-emerald-600 text-white text-[10px] font-black py-2 rounded-lg active:scale-90">🎯 Ace</button>
                        <button onClick={() => recordEvent({ type: 'serve', player: role, outcome: 'point_opp' })} className="bg-gradient-to-br from-red-500 to-rose-600 text-white text-[10px] font-black py-2 rounded-lg active:scale-90">❌ Err</button>
                        <button onClick={() => recordEvent({ type: 'serve', player: role, outcome: 'neutral' })} className="bg-gradient-to-br from-sky-500 to-blue-600 text-white text-[10px] font-black py-2 rounded-lg active:scale-90">○ Spiel</button>
                      </div>

                      <div className="text-[10px] font-bold text-gray-500 mb-1">🧱 BLOCK</div>
                      <div className="grid grid-cols-2 gap-1 mb-2">
                        <button onClick={() => recordEvent({ type: 'block', subtype: 'stuff', player: role, outcome: 'point_us' })} className="bg-gradient-to-br from-green-500 to-emerald-600 text-white text-[10px] font-black py-2 rounded-lg active:scale-90">💪 Stuff</button>
                        <button onClick={() => recordEvent({ type: 'block', subtype: 'touch', player: role, outcome: 'neutral' })} className="bg-gradient-to-br from-amber-500 to-orange-600 text-white text-[10px] font-black py-2 rounded-lg active:scale-90">✋ Touch</button>
                      </div>

                      <div className="text-[10px] font-bold text-gray-500 mb-1">📥 ANNAHME</div>
                      <div className="grid grid-cols-2 gap-1 mb-1">
                        {RECEPTION_QUALITY.map(q => (
                          <button key={q.id} onClick={() => recordEvent({ type: 'reception', quality: q.value, player: role, outcome: 'neutral' })} className={`bg-gradient-to-br ${q.color} text-white text-[11px] font-black py-2 rounded-lg active:scale-90`}>{q.label}</button>
                        ))}
                      </div>
                      <button onClick={() => recordEvent({ type: 'reception', quality: -1, player: role, outcome: 'point_opp' })} className="w-full bg-red-600 text-white text-[10px] font-black py-2 rounded-lg mb-2 active:scale-90">💀 Fehler</button>

                      <div className="text-[10px] font-bold text-gray-500 mb-1">🛡️ DIG</div>
                      <div className="grid grid-cols-2 gap-1 mb-2">
                        <button onClick={() => recordEvent({ type: 'dig', quality: 'good', player: role, outcome: 'neutral' })} className="bg-gradient-to-br from-teal-500 to-cyan-600 text-white text-[10px] font-black py-2 rounded-lg active:scale-90">✨ Gut</button>
                        <button onClick={() => recordEvent({ type: 'dig', quality: 'error', player: role, outcome: 'point_opp' })} className="bg-gradient-to-br from-red-500 to-rose-600 text-white text-[10px] font-black py-2 rounded-lg active:scale-90">💔 Err</button>
                      </div>

                      <div className="text-[10px] font-bold text-gray-500 mb-1">❌ FEHLER</div>
                      <div className="grid grid-cols-2 gap-1">
                        <button onClick={() => recordEvent({ type: 'error', subtype: 'net', player: role, outcome: 'point_opp' })} className="bg-gradient-to-br from-gray-600 to-gray-800 text-white text-[10px] font-bold py-2 rounded-lg active:scale-90">Netz</button>
                        <button onClick={() => recordEvent({ type: 'error', subtype: 'foot', player: role, outcome: 'point_opp' })} className="bg-gradient-to-br from-gray-600 to-gray-800 text-white text-[10px] font-bold py-2 rounded-lg active:scale-90">Fuß</button>
                        <button onClick={() => recordEvent({ type: 'error', subtype: 'double', player: role, outcome: 'point_opp' })} className="bg-gradient-to-br from-gray-600 to-gray-800 text-white text-[10px] font-bold py-2 rounded-lg active:scale-90">Doppel</button>
                        <button onClick={() => recordEvent({ type: 'error', subtype: 'other', player: role, outcome: 'point_opp' })} className="bg-gradient-to-br from-gray-600 to-gray-800 text-white text-[10px] font-bold py-2 rounded-lg active:scale-90">Andere</button>
                      </div>
                    </div>
                  );
                })}
              </div>

              <div className="grid grid-cols-2 gap-2 mb-3">
                <button onClick={undoLastEvent} disabled={currentMatch.events.length === 0} className="bg-gray-700 text-white p-3 rounded-2xl font-bold disabled:opacity-40 flex items-center justify-center gap-2"><Undo size={16}/> Rückgängig</button>
                <button onClick={() => { if (confirm('Nächster Satz?')) nextSet(); }} className="bg-gradient-to-r from-yellow-400 to-orange-500 text-white p-3 rounded-2xl font-bold">Satz {currentMatch.set + 1} →</button>
              </div>

              {currentMatch.events.length > 0 && (
                <div className="bg-white/95 rounded-2xl p-3 shadow-xl">
                  <div className="text-xs font-bold text-gray-600 mb-2">📜 LETZTE</div>
                  <div className="space-y-1 max-h-32 overflow-y-auto">
                    {currentMatch.events.slice(-6).reverse().map(e => {
                      let label = '';
                      if (e.type === 'attack') label = `⚔️ ${e.subtype}`;
                      else if (e.type === 'serve') label = '🏐 Serve';
                      else if (e.type === 'reception') label = `📥 Annahme ${e.quality >= 0 ? e.quality : 'Err'}`;
                      else if (e.type === 'block') label = e.subtype === 'stuff' ? '🧱 Stuff' : '✋ Touch';
                      else if (e.type === 'dig') label = e.quality === 'good' ? '🛡️ Dig' : '💔 Dig Err';
                      else if (e.type === 'error') label = `❌ ${e.subtype}`;
                      const outcomeEmoji = e.outcome === 'point_us' ? '🟢' : e.outcome === 'point_opp' ? '🔴' : '⚪';
                      const playerName = e.player ? teamSnap[e.player].name : '—';
                      return (
                        <div key={e.id} className="text-xs flex justify-between bg-gray-50 rounded-lg px-2 py-1">
                          <span className="font-semibold">{outcomeEmoji} {label}</span>
                          <span className="text-gray-500 truncate ml-2">{playerName}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>

            {cameraPreviewOpen && cameraStream && (
              <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4" onClick={() => setCameraPreviewOpen(false)}>
                <div className="relative w-full max-w-md">
                  <video autoPlay playsInline muted ref={el => { if (el && el.srcObject !== cameraStream) el.srcObject = cameraStream; }} className="w-full rounded-2xl" />
                  <div className="absolute top-2 left-2 flex items-center gap-1 bg-red-500 text-white px-2 py-1 rounded-full text-xs font-black animate-pulse">
                    <span className="w-2 h-2 bg-white rounded-full"></span> LIVE
                  </div>
                  <button onClick={() => setCameraPreviewOpen(false)} className="absolute top-2 right-2 bg-white/90 text-gray-800 w-8 h-8 rounded-full font-black">✕</button>
                </div>
              </div>
            )}
          </div>
        );
      }

      // === STATS ===
      if (view === 'stats') {
        if (viewingMatch) {
          const m = viewingMatch;
          const teamSnap = m.teamSnapshot;
          const statsBlocker = calcStats(m.events, 'blocker');
          const statsDefender = calcStats(m.events, 'defender');
          const sideoutStats = calcSideoutStats(m.events);

          return (
            <div className="min-h-screen bg-gradient-to-br from-amber-300 via-orange-400 to-pink-500 p-4">
              <div className="max-w-md mx-auto">
                <div className="flex items-center gap-3 mb-4 pt-2">
                  <button onClick={() => setViewingMatch(null)} className="bg-white/20 p-2 rounded-full"><ArrowLeft /></button>
                  <h1 className="text-2xl font-black text-white">vs {m.opponent}</h1>
                </div>

                <div className="bg-white/95 rounded-2xl p-4 shadow-xl mb-3">
                  <div className="text-xs text-gray-500 mb-2">{new Date(m.date).toLocaleDateString('de-DE')}</div>
                  {m.setScores.map((s, i) => (
                    <div key={i} className="flex justify-between font-bold">
                      <span>Satz {i + 1}</span>
                      <span className={s.teamScore > s.opponentScore ? 'text-green-600' : 'text-red-500'}>{s.teamScore} : {s.opponentScore}</span>
                    </div>
                  ))}
                </div>

                {m.hasVideo && <MatchVideoPlayer matchId={m.id} events={m.events} teamSnap={teamSnap} />}

                <div className="bg-white/95 rounded-2xl p-4 shadow-xl mb-3">
                  <h3 className="font-black text-cyan-700 mb-2">🎯 Sideout Stats</h3>
                  <div className="grid grid-cols-2 gap-2">
                    <div className="bg-cyan-100 p-3 rounded-xl text-center">
                      <div className="text-3xl font-black text-cyan-700">{sideoutStats.sideoutPct}%</div>
                      <div className="text-xs text-gray-600">Sideout</div>
                      <div className="text-[10px] text-gray-500">{sideoutStats.sideoutsWon}/{sideoutStats.sideoutOpps}</div>
                    </div>
                    <div className="bg-orange-100 p-3 rounded-xl text-center">
                      <div className="text-3xl font-black text-orange-700">{sideoutStats.pointScoringPct}%</div>
                      <div className="text-xs text-gray-600">Point Scoring</div>
                      <div className="text-[10px] text-gray-500">{sideoutStats.pointsScored}/{sideoutStats.pointScoringOpps}</div>
                    </div>
                  </div>
                </div>

                {[
                  { role: 'blocker', stats: statsBlocker, player: teamSnap.blocker, icon: '🧱', color: 'from-indigo-500 to-purple-600' },
                  { role: 'defender', stats: statsDefender, player: teamSnap.defender, icon: '🛡️', color: 'from-cyan-500 to-teal-600' },
                ].map(({ role, stats, player, icon, color }) => (
                  <div key={role} className="bg-white/95 rounded-2xl p-4 shadow-xl mb-3">
                    <div className="flex items-center gap-2 mb-2">
                      <div className={`w-10 h-10 bg-gradient-to-br ${color} rounded-xl flex items-center justify-center text-xl`}>{icon}</div>
                      <div>
                        <div className="text-xs text-gray-500">{role === 'blocker' ? 'Blocker' : 'Defender'}</div>
                        <div className="font-black text-lg">{player.name}</div>
                      </div>
                    </div>
                    <div className="grid grid-cols-3 gap-1 text-xs">
                      <div className="bg-green-100 p-2 rounded text-center">
                        <div className="font-black text-green-700">{stats.attackKills}</div>
                        <div className="text-gray-600">💥 Kills</div>
                        <div className="text-[10px] text-gray-500">{stats.attackPct}%</div>
                      </div>
                      <div className="bg-red-100 p-2 rounded text-center">
                        <div className="font-black text-red-700">{stats.attackErrors}</div>
                        <div className="text-gray-600">❌ Att-Err</div>
                      </div>
                      <div className="bg-sky-100 p-2 rounded text-center">
                        <div className="font-black text-sky-700">{stats.aces}</div>
                        <div className="text-gray-600">🏐 Aces</div>
                      </div>
                      <div className="bg-orange-100 p-2 rounded text-center">
                        <div className="font-black text-orange-700">{stats.serveErrors}</div>
                        <div className="text-gray-600">📉 Svc-Err</div>
                      </div>
                      <div className="bg-purple-100 p-2 rounded text-center">
                        <div className="font-black text-purple-700">{stats.blocks}</div>
                        <div className="text-gray-600">🧱 Blocks</div>
                      </div>
                      <div className="bg-teal-100 p-2 rounded text-center">
                        <div className="font-black text-teal-700">{stats.digs}</div>
                        <div className="text-gray-600">🛡️ Digs</div>
                      </div>
                    </div>
                  </div>
                ))}

                <div className="bg-white/95 rounded-2xl p-4 shadow-xl">
                  <h3 className="font-black text-red-700 mb-2">⚔️ Attack-Typen</h3>
                  <div className="space-y-1">
                    {ATTACK_TYPES.map(t => {
                      const attacks = m.events.filter(e => e.type === 'attack' && e.subtype === t.id);
                      const kills = attacks.filter(e => e.outcome === 'point_us').length;
                      const errors = attacks.filter(e => e.outcome === 'point_opp').length;
                      const pct = attacks.length > 0 ? Math.round((kills / attacks.length) * 100) : 0;
                      if (attacks.length === 0) return null;
                      return (
                        <div key={t.id} className="flex items-center gap-2 bg-gray-50 rounded-lg p-1.5">
                          <div className="w-8 h-8 rounded-lg flex items-center justify-center bg-gray-200"><span>{t.emoji}</span></div>
                          <div className="flex-1 text-sm font-bold">{t.label}</div>
                          <div className="text-xs">
                            <span className="text-green-600 font-black">{kills}K</span>{' · '}
                            <span className="text-red-500 font-black">{errors}E</span>{' · '}
                            <span className="text-gray-700 font-black">{pct}%</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        return (
          <div className="min-h-screen bg-gradient-to-br from-amber-300 via-orange-400 to-pink-500 p-4">
            <div className="max-w-md mx-auto">
              <div className="flex items-center gap-3 mb-4 pt-2">
                <button onClick={() => setView('home')} className="bg-white/20 p-2 rounded-full"><ArrowLeft /></button>
                <h1 className="text-3xl font-black text-white">📊 Historie</h1>
              </div>
              {matches.length === 0 ? (
                <div className="bg-white/95 rounded-2xl p-8 text-center shadow-xl">
                  <div className="text-5xl mb-3">🏖️</div>
                  <div className="font-bold text-gray-700">Noch keine Matches</div>
                </div>
              ) : (
                <div className="bg-white/95 rounded-2xl p-4 shadow-xl">
                  <div className="space-y-2">
                    {matches.map(m => {
                      const setsWon = m.setScores.filter(s => s.teamScore > s.opponentScore).length;
                      const setsLost = m.setScores.length - setsWon;
                      const won = setsWon > setsLost;
                      return (
                        <div key={m.id} className="flex items-center gap-2">
                          <button onClick={() => setViewingMatch(m)} className={`flex-1 p-3 rounded-xl text-left ${won ? 'bg-gradient-to-r from-green-100 to-emerald-100' : 'bg-gradient-to-r from-red-100 to-rose-100'}`}>
                            <div className="flex justify-between items-center">
                              <div>
                                <div className="font-bold text-gray-800 flex items-center gap-1">
                                  vs {m.opponent}
                                  {m.hasVideo && <span className="text-pink-600">🎬</span>}
                                </div>
                                <div className="text-xs text-gray-500">{new Date(m.date).toLocaleDateString('de-DE')}</div>
                              </div>
                              <div className={`font-black text-lg ${won ? 'text-green-700' : 'text-red-600'}`}>{setsWon}:{setsLost}</div>
                            </div>
                          </button>
                          <button onClick={async () => {
                            if (confirm('Löschen?')) {
                              if (m.hasVideo) { try { await videoDB.delete(m.id); } catch (e) {} }
                              await saveMatches(matches.filter(x => x.id !== m.id));
                            }
                          }} className="text-red-500 p-2"><Trash2 size={18} /></button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      return null;
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
      });
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<BeachTracker />);
  </script>
</body>
</html>
