<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="60%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="sand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </radialGradient>
    <linearGradient id="ball" x1="30%" y1="30%" x2="70%" y2="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners (iOS-style) -->
  <rect width="512" height="512" rx="100" fill="url(#sky)"/>
  
  <!-- Sun -->
  <circle cx="140" cy="150" r="55" fill="url(#sun)" opacity="0.9"/>
  
  <!-- Sand dune -->
  <path d="M 0 390 Q 128 340 256 370 T 512 380 L 512 512 L 0 512 Z" fill="url(#sand)"/>
  
  <!-- Beach volleyball net posts -->
  <rect x="80" y="230" width="6" height="180" fill="#78350f"/>
  <rect x="426" y="230" width="6" height="180" fill="#78350f"/>
  
  <!-- Net -->
  <rect x="83" y="230" width="346" height="45" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.85"/>
  <g stroke="#ffffff" stroke-width="1.5" opacity="0.75">
    <line x1="105" y1="230" x2="105" y2="275"/>
    <line x1="130" y1="230" x2="130" y2="275"/>
    <line x1="155" y1="230" x2="155" y2="275"/>
    <line x1="180" y1="230" x2="180" y2="275"/>
    <line x1="205" y1="230" x2="205" y2="275"/>
    <line x1="230" y1="230" x2="230" y2="275"/>
    <line x1="255" y1="230" x2="255" y2="275"/>
    <line x1="280" y1="230" x2="280" y2="275"/>
    <line x1="305" y1="230" x2="305" y2="275"/>
    <line x1="330" y1="230" x2="330" y2="275"/>
    <line x1="355" y1="230" x2="355" y2="275"/>
    <line x1="380" y1="230" x2="380" y2="275"/>
    <line x1="405" y1="230" x2="405" y2="275"/>
    <line x1="83" y1="245" x2="429" y2="245"/>
    <line x1="83" y1="260" x2="429" y2="260"/>
  </g>
  <rect x="83" y="225" width="346" height="10" fill="#ffffff"/>
  
  <!-- Volleyball - large, in flight above the net -->
  <g transform="translate(340, 180)">
    <circle r="68" fill="url(#ball)" stroke="#374151" stroke-width="3"/>
    <!-- Classic volleyball curves -->
    <path d="M -60 -30 Q 0 -15 60 -30" fill="none" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
    <path d="M -60 10 Q 0 25 60 10" fill="none" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
    <path d="M -20 -65 Q -30 0 -20 65" fill="none" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
    <path d="M 20 -65 Q 30 0 20 65" fill="none" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
    <!-- Subtle highlight -->
    <ellipse cx="-20" cy="-25" rx="18" ry="10" fill="#ffffff" opacity="0.6"/>
  </g>
  
  <!-- Ball shadow on sand -->
  <ellipse cx="320" cy="420" rx="40" ry="8" fill="#000000" opacity="0.2"/>
</svg>
